name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch tag refs
        run: git fetch --force origin "refs/tags/*:refs/tags/*"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release version
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          VERSION_CODE="${GITHUB_RUN_NUMBER}"

          if [ -z "$VERSION_NAME" ] || [ "$VERSION_NAME" = "$GITHUB_REF_NAME" ]; then
            echo "Tag must look like v1.0.1" >&2
            exit 1
          fi

          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - name: Extract release notes
        run: |
          TAG_REF="refs/tags/$GITHUB_REF_NAME"
          TAG_OBJECT_TYPE="$(git for-each-ref "$TAG_REF" --format='%(objecttype)')"

          if [ "$TAG_OBJECT_TYPE" = "tag" ]; then
            TAG_MESSAGE="$(git for-each-ref "$TAG_REF" --format='%(contents)')"
          else
            echo "Annotated tag metadata is unavailable for $GITHUB_REF_NAME; using the tagged commit message as release notes."
            TAG_MESSAGE="$(git log -1 --format=%B "$GITHUB_SHA")"
          fi

          if ! printf '%s' "$TAG_MESSAGE" | grep -q '[^[:space:]]'; then
            TAG_MESSAGE="$GITHUB_REF_NAME"
          fi

          printf '%s\n' "$TAG_MESSAGE" > release-notes.md

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for key in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD
          do
            if [ -z "${!key}" ]; then
              echo "Missing GitHub secret: $key" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Configure Android signing secrets before publishing releases." >&2
            exit 1
          fi

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/release-keystore.jks"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          echo "RELEASE_STORE_FILE=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Build APKs
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon \
            :app:assembleRelease \
            -PAPP_VERSION_NAME="$VERSION_NAME" \
            -PAPP_VERSION_CODE="$VERSION_CODE" \
            -PRELEASE_STORE_FILE="$RELEASE_STORE_FILE" \
            -PRELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" \
            -PRELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS" \
            -PRELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD"

      - name: Prepare assets
        run: |
          cp app/build/outputs/apk/release/app-release.apk workshop-native-release.apk
          sha256sum workshop-native-release.apk > SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            workshop-native-release.apk
            SHA256SUMS.txt
